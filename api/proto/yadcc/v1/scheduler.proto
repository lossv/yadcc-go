syntax = "proto3";

package yadcc.v1;

option go_package = "yadcc-go/api/gen/yadcc/v1;yadccv1";

import "yadcc/v1/common.proto";

service SchedulerService {
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc WaitForStartingTask(WaitForStartingTaskRequest) returns (WaitForStartingTaskResponse);
  rpc KeepTaskAlive(KeepTaskAliveRequest) returns (KeepTaskAliveResponse);
  rpc FreeTask(FreeTaskRequest) returns (FreeTaskResponse);
  rpc GetRunningTasks(GetRunningTasksRequest) returns (GetRunningTasksResponse);
  // GetConfig allows daemons to pull dynamic cluster configuration (e.g.
  // acceptable user tokens, servant capacity overrides).
  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse);
}

message HeartbeatRequest {
  string token = 1;
  string location = 2;
  uint32 version = 3;
  uint32 capacity = 4;
  uint32 current_load = 5;
  uint64 total_memory_bytes = 6;
  uint64 available_memory_bytes = 7;
  repeated EnvironmentDesc environments = 8;
  // is_dedicated indicates this daemon is running in dedicated (build-farm) mode.
  // Dedicated workers are preferred over user-mode workers by the scheduler.
  bool is_dedicated = 9;
}

message HeartbeatResponse {
  repeated string acceptable_daemon_tokens = 1;
  repeated uint64 expired_task_grant_ids = 2;
}

message WaitForStartingTaskRequest {
  string token = 1;
  EnvironmentDesc environment = 2;
  uint32 immediate_requests = 3;
  uint32 prefetch_requests = 4;
  uint32 milliseconds_to_wait = 5;
  // requester_location is the servant address ("host:port") of the requesting
  // daemon.  The scheduler uses this for self-avoidance: it will not assign
  // the requester as its own worker unless no other worker is available.
  string requester_location = 6;
}

message StartingTaskGrant {
  uint64 task_grant_id = 1;
  string servant_location = 2;
}

message WaitForStartingTaskResponse {
  repeated StartingTaskGrant grants = 1;
}

message KeepTaskAliveRequest {
  string token = 1;
  repeated uint64 task_grant_ids = 2;
}

message KeepTaskAliveResponse {
  repeated bool statuses = 1;
}

message FreeTaskRequest {
  string token = 1;
  repeated uint64 task_grant_ids = 2;
}

message FreeTaskResponse {}

message GetRunningTasksRequest {
  string token = 1;
}

// RunningTaskInfo describes a single in-flight task grant.
message RunningTaskInfo {
  uint64 task_grant_id = 1;
  // worker_location is the servant address ("host:port") executing the task.
  string worker_location = 2;
  // age_seconds is how long ago the grant was issued (rounded to the nearest
  // second).
  uint32 age_seconds = 3;
}

message GetRunningTasksResponse {
  repeated RunningTaskInfo tasks = 1;
  // total_workers is the number of currently registered workers.
  uint32 total_workers = 2;
}

// GetConfigRequest is sent by daemons to pull dynamic cluster configuration.
message GetConfigRequest {
  string token = 1;
}

// GetConfigResponse carries cluster-wide dynamic configuration pushed by the
// operator via the scheduler.
message GetConfigResponse {
  // max_local_parallel_tasks overrides the daemon's computed CPU-based limit
  // for concurrent local compilations.  0 means "use default".
  uint32 max_local_parallel_tasks = 1;
  // max_servant_tasks overrides the daemon's servant capacity.  0 = default.
  uint32 max_servant_tasks = 2;
  // acceptable_user_tokens is the current token whitelist for user RPCs.
  // Empty means accept all.
  repeated string acceptable_user_tokens = 3;
  // acceptable_servant_tokens is the current token whitelist for servant RPCs.
  repeated string acceptable_servant_tokens = 4;
}
